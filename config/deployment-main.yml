---
# PVC for WordPress content (uploads, themes, plugins)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-blog-pvc
  namespace: main
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: do-block-storage-retain
  resources:
    requests:
      storage: 5Gi
---
# WordPress Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asegurus-blog-main
  labels:
    app: asegurus-blog-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asegurus-blog-main
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: asegurus-blog-main
    spec:
      containers:
      - name: wordpress
        image: wordpress:6-apache
        ports:
        - containerPort: 80
          name: http
        env:
        - name: WORDPRESS_DB_HOST
          valueFrom:
            secretKeyRef:
              name: blog-db-config
              key: host
        - name: WORDPRESS_DB_USER
          valueFrom:
            secretKeyRef:
              name: blog-db-config
              key: username
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blog-db-config
              key: password
        - name: WORDPRESS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: blog-db-config
              key: database
        - name: WORDPRESS_CONFIG_EXTRA
          value: |
            define('MYSQL_CLIENT_FLAGS', MYSQLI_CLIENT_SSL);
            define('WP_HOME', 'https://blog.asegurus.com');
            define('WP_SITEURL', 'https://blog.asegurus.com');
            define('FORCE_SSL_ADMIN', true);
            if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
              $_SERVER['HTTPS'] = 'on';
            }
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            cpu: 500m
            memory: 768Mi
        readinessProbe:
          httpGet:
            path: /wp-login.php
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: wordpress-content
          mountPath: /var/www/html/wp-content
        - name: php-config
          mountPath: /usr/local/etc/php/conf.d/uploads.ini
          subPath: uploads.ini
      volumes:
      - name: wordpress-content
        persistentVolumeClaim:
          claimName: wordpress-blog-pvc
      - name: php-config
        configMap:
          name: wordpress-php-config
      imagePullSecrets:
      - name: registry-asegurus
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: asegurus-blog-main
  labels:
    app: asegurus-blog-main
spec:
  type: NodePort
  selector:
    app: asegurus-blog-main
  ports:
  - name: http
    port: 80
    targetPort: 80
