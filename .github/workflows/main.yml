name: main-deploy
on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:

  deploy:
    name: Deploy WordPress to main
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG_V2 }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: kubectl apply -f config/deployment-main.yml --namespace=main

    - name: Verify deployment
      run: kubectl rollout status deployment/asegurus-blog-main --namespace=main --timeout=120s
